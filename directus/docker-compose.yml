services:
  directus:
    image: directus/directus:11
    ports:
      - "${DIRECTUS_PORT:-8057}:8055"
    environment:
      KEY: "${DIRECTUS_KEY:-replace-with-random-key}"
      SECRET: "${DIRECTUS_SECRET:-replace-with-random-secret}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-change-this-password}"
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${DIRECTUS_CORS_ORIGIN:-http://127.0.0.1:5176}"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-http://127.0.0.1:8057}"
      USERS_REGISTER_ENABLED: "true"
      WEBSOCKETS_ENABLED: "true"
    volumes:
      - ./database:/directus/database
      - ./uploads:/directus/uploads
